name: scenarios

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # 주 1회 codex 세션 갱신(keepalive). 8일 넘게 갱신이 없으면 세션이
    # 만료되므로, 이 크론이 도는 한 재로그인 없이 유지된다. (docs/decisions.md §2)
    - cron: '17 6 * * 1'

jobs:
  # 결정론적 검증 묶음: 타입체크 + 린트 + 아키텍처 경계(depcruise) + 유닛테스트.
  # 이 잡이 곧 "구조를 함부로 깨지 못하게 하는" 관문이다 (docs/decisions.md §5)
  checks:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm check:arch
      - run: pnpm test:unit

  # 모든 사용자 시나리오 E2E를 실제 샌드박스·codex·GitHub으로 통과시킨다.
  # (scenarios/README.md, docs/decisions.md §11 — 시나리오 1개 = e2e 1개, 목 없이 실제 통과)
  scenarios:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    # 시나리오는 순차 실행(workers:1)이라 실행 시간이 합산된다. 각 spec의
    # per-test 타임아웃(20~25분) 합에 여유를 둔다.
    timeout-minutes: 120
    permissions:
      contents: write # 스크린샷을 ci-media 브랜치에 커밋
      pull-requests: write # 스크린샷 댓글
    env:
      E2E_REPO: ${{ vars.E2E_REPO }}
      E2E_GITHUB_TOKEN: ${{ secrets.E2E_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium

      # keepalive 잡이 갱신해 둔 auth.json 캐시를 우선 사용, 없으면 secret 시드
      - uses: actions/cache/restore@v4
        with:
          path: ~/.codex-auth-cache
          key: codex-auth-${{ github.run_id }}
          restore-keys: codex-auth-
      - name: Codex 구독 인증 준비 (docs/decisions.md §2)
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: bash .github/scripts/codex-auth.sh seed

      # 시나리오 작업은 "한 줄 추가" 수준이라 낮은 추론 강도로 충분하다 —
      # Actions 분·구독 rate limit을 아낀다. ~/.codex 가 샌드박스에 마운트되어
      # 이 config.toml 이 그대로 적용된다. (docs/decisions.md §12)
      - name: codex 모델·추론 강도 설정 (CI 비용 절감)
        env:
          CODEX_MODEL: ${{ vars.CODEX_MODEL }}
          CODEX_REASONING_EFFORT: ${{ vars.CODEX_REASONING_EFFORT || 'low' }}
        run: bash .github/scripts/codex-config.sh

      # devspace 서버는 Playwright의 webServer가 `pnpm dev`로 띄운다
      # (playwright.config.ts, docs/decisions.md §8). e2e 디렉터리의 모든
      # 시나리오 spec을 순차로 통과시킨다 — 이 잡이 사용자 진실의 최종 관문이다.
      - name: 전체 시나리오 E2E 실행
        run: pnpm e2e

      # 이 run에서 codex가 갱신(회전)한 auth.json을 캐시에 되저장한다. refresh
      # token은 1회용이라, 저장하지 않으면 다음 run이 이미 소비된 토큰을 복원해
      # refresh_token_reused(401)로 깨진다(§13). 성패와 무관하게(always) 마지막으로
      # 회전된 토큰을 보존한다 — keepalive와 같은 저장 경로. (docs/decisions.md §2, §13)
      - name: 갱신된 codex 인증 되저장
        if: always()
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: bash .github/scripts/codex-auth.sh save
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: ~/.codex-auth-cache
          key: codex-auth-${{ github.run_id }}

      # 주요 장면 + 실패 장면 스크린샷을 트리거한 PR에 인라인 이미지 댓글로 첨부.
      # (fork PR은 토큰이 읽기 전용이라 제외 — 혼자 쓰는 레포라 사실상 해당 없음)
      - name: 스크린샷을 PR 댓글로 첨부 (docs/decisions.md §4)
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash .github/scripts/pr-screenshots.sh

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # 주 1회: codex를 한 번 아주 짧게 실행해 세션 토큰을 갱신하고,
  # 갱신된 auth.json을 암호화 캐시로 저장한다. (docs/decisions.md §2)
  codex-auth-keepalive:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache/restore@v4
        with:
          path: ~/.codex-auth-cache
          key: codex-auth-${{ github.run_id }}
          restore-keys: codex-auth-
      - name: auth.json 시드/복원
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: bash .github/scripts/codex-auth.sh seed
      - run: npm install -g @openai/codex # keepalive 잡은 레포 의존성이 필요 없어 npm 글로벌 설치로 충분
      - name: 토큰 갱신을 위한 최소 실행
        run: codex exec --sandbox read-only --skip-git-repo-check "Reply with exactly one word - ok"
      - name: 갱신본 암호화 저장
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: bash .github/scripts/codex-auth.sh save
      - uses: actions/cache/save@v4
        with:
          path: ~/.codex-auth-cache
          key: codex-auth-${{ github.run_id }}
