name: scenarios

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  # 골든패스가 구현될 때까지 이 잡은 의도적으로 빨간불이다. (scenarios/README.md)
  golden-path:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write # 스크린샷을 ci-media 브랜치에 커밋
      pull-requests: write # 스크린샷 댓글
    env:
      E2E_REPO: ${{ vars.E2E_REPO }}
      E2E_GITHUB_TOKEN: ${{ secrets.E2E_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Codex 구독 인증 복원 (docs/decisions.md §2)
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          if [ -z "$CODEX_AUTH_JSON" ]; then
            echo "::warning::CODEX_AUTH_JSON secret이 비어 있음 — 에이전트 단계는 실패합니다"
          else
            mkdir -p ~/.codex
            printf '%s' "$CODEX_AUTH_JSON" > ~/.codex/auth.json
            chmod 600 ~/.codex/auth.json
          fi

      # TODO(골든패스 구현 시): 여기서 devspace 서버를 띄운다.
      # 지금은 서버가 없으므로 시나리오 1단계(접속)에서 실패한다 — 그게 현재 목표 지점.

      - name: 골든패스 시나리오 실행
        run: npm run e2e:golden-path

      # 주요 장면 + 실패 장면 스크린샷을 트리거한 PR에 인라인 이미지 댓글로 첨부.
      # (fork PR은 토큰이 읽기 전용이라 제외 — 혼자 쓰는 레포라 사실상 해당 없음)
      - name: 스크린샷을 PR 댓글로 첨부 (docs/decisions.md §4)
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash .github/scripts/pr-screenshots.sh

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
