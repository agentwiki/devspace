# Local dev stack: Postgres + the four services.
# Build once from the shared image; each service overrides command + PORT.
name: devspace

x-svc: &svc
  build:
    context: ..
    dockerfile: infra/Dockerfile
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
  environment:
    DATABASE_URL: postgres://devspace:devspace@postgres:5432/devspace

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: devspace
      POSTGRES_PASSWORD: devspace
      POSTGRES_DB: devspace
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U devspace']
      interval: 5s
      timeout: 5s
      retries: 10

  orchestrator:
    <<: *svc
    command: ['node', 'apps/orchestrator-svc/dist/main.js']
    environment:
      DATABASE_URL: postgres://devspace:devspace@postgres:5432/devspace
      PORT: '4000'
      SECRET_ENVELOPE_KEY: ${SECRET_ENVELOPE_KEY:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      # Split mode (M6): set DEVSPACE_INTERNAL_TOKEN in .env and the render
      # transport + internal API light up; unset, render surfaces to logs.
      DEVSPACE_INTERNAL_TOKEN: ${DEVSPACE_INTERNAL_TOKEN:-}
      GATEWAY_RENDER_URL: ${DEVSPACE_INTERNAL_TOKEN:+http://chat-gateway:4002/render}
      # mTLS mode (M13): mount PEM files and set DEVSPACE_TLS_CERT/KEY/CA
      # (paths) INSTEAD of the shared token — never both. The split API then
      # serves the chat gateway on DEVSPACE_TLS_PORT (default PORT+1) over
      # mutual TLS and internal urls switch to https; the plain port keeps
      # /health + webhooks only.
      DEVSPACE_TLS_CERT: ${DEVSPACE_TLS_CERT:-}
      DEVSPACE_TLS_KEY: ${DEVSPACE_TLS_KEY:-}
      DEVSPACE_TLS_CA: ${DEVSPACE_TLS_CA:-}
      # Fleet mode (M8; weighted M12): comma-separated
      # name=url[|capacity][|cpu=<cores>][|mem=<MB>][|drain] entries, e.g.
      # SANDBOX_HOSTS=local=http://sandbox-core:4001|8|cpu=16|mem=65536 — the
      # orchestrator then places envs on remote sandbox hosts (least fractional
      # utilization; a request's resource grant must fit every budget the host
      # declares) and execs ride the devspace-exec wire (requires
      # DEVSPACE_INTERNAL_TOKEN). Unset: the zero-config in-process sandbox
      # (M4) is unchanged.
      SANDBOX_HOSTS: ${SANDBOX_HOSTS:-}
      # Warm pools (M9): comma-separated repoUrl[#ref]=size entries, e.g.
      # SANDBOX_WARM_POOLS=https://github.com/acme/widgets.git#main=2 — the
      # orchestrator pre-provisions matching envs and a session on that repo
      # claims one in milliseconds. Unset: every create is a cold provision.
      SANDBOX_WARM_POOLS: ${SANDBOX_WARM_POOLS:-}
    ports:
      - '4000:4000'

  sandbox-core:
    <<: *svc
    command: ['node', 'apps/sandbox-core-svc/dist/main.js']
    environment:
      PORT: '4001'
      # M8: with the shared token set, the whole surface requires the bearer
      # and the devspace-exec stream serves; unset, the JSON surface stays a
      # local ops tool and the exec stream refuses (m8-plan Decision 5).
      DEVSPACE_INTERNAL_TOKEN: ${DEVSPACE_INTERNAL_TOKEN:-}
      # mTLS mode (M13): the alternative to the token (never both) — the full
      # surface then serves the orchestrator on DEVSPACE_TLS_PORT (default
      # PORT+1); the plain port keeps /health only.
      DEVSPACE_TLS_CERT: ${DEVSPACE_TLS_CERT:-}
      DEVSPACE_TLS_KEY: ${DEVSPACE_TLS_KEY:-}
      DEVSPACE_TLS_CA: ${DEVSPACE_TLS_CA:-}
      # Ports preview proxy (M6): set PREVIEW_PROXY_PORT (e.g. 4010) and map
      # it below; PREVIEW_BASE_URL is what users reach (TLS in front).
      PREVIEW_PROXY_PORT: ${PREVIEW_PROXY_PORT:-}
      PREVIEW_BASE_URL: ${PREVIEW_BASE_URL:-}
      # Host-side capacity backstop (M9): cap live envs at this host no
      # matter what the placement layer believes. Unset: uncapped (pre-M9).
      SANDBOX_MAX_ENVS: ${SANDBOX_MAX_ENVS:-}
      # Durable env table (M11): point at a persistent path (mount a volume)
      # and this host's env table — pool marks included — survives a restart.
      # Unset: the documented in-memory posture (pre-M11).
      SANDBOX_STATE_DIR: ${SANDBOX_STATE_DIR:-}
    ports:
      - '4001:4001'

  chat-gateway:
    <<: *svc
    command: ['node', 'apps/chat-gateway-svc/dist/main.js']
    environment:
      PORT: '4002'
      CHAT_PLATFORM: ${CHAT_PLATFORM:-slack}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      DISCORD_APPLICATION_ID: ${DISCORD_APPLICATION_ID:-}
      SECRET_ENVELOPE_KEY: ${SECRET_ENVELOPE_KEY:-}
      # Split mode (M6): with the shared token set, the gateway talks HTTP to
      # the orchestrator and needs no database at all.
      DEVSPACE_INTERNAL_TOKEN: ${DEVSPACE_INTERNAL_TOKEN:-}
      ORCHESTRATOR_URL: ${DEVSPACE_INTERNAL_TOKEN:+http://orchestrator:4000}
      # mTLS mode (M13): the alternative to the token (never both) — /render
      # then serves the orchestrator on DEVSPACE_TLS_PORT (default PORT+1) and
      # ORCHESTRATOR_URL must point at the orchestrator's https TLS port.
      DEVSPACE_TLS_CERT: ${DEVSPACE_TLS_CERT:-}
      DEVSPACE_TLS_KEY: ${DEVSPACE_TLS_KEY:-}
      DEVSPACE_TLS_CA: ${DEVSPACE_TLS_CA:-}
    ports:
      - '4002:4002'

  agent-runner:
    <<: *svc
    command: ['node', 'apps/agent-runner-svc/dist/main.js']
    environment:
      PORT: '4003'
    ports:
      - '4003:4003'

volumes:
  pgdata:
